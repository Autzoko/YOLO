# ============================================================
# BUS-2D Pipeline — Master Configuration
# All scripts read paths and parameters from this file.
# ============================================================

# ----------------------------------------------------------
# 1. Raw data locations (read-only)
# ----------------------------------------------------------
data_root: "/Volumes/Autzoko/Dataset/Ultrasound"

datasets:
  abus:
    base: "${data_root}/ABUS/data"
    splits:
      - Train
      - Validation
      - Test
    # CSV files (relative to each split dir)
    labels_csv: "labels.csv" # case_id, label(B/M), data_path, mask_path
    bbx_csv: "bbx_labels.csv" # id, c_x, c_y, c_z, len_x, len_y, len_z
    spacing_mm: [1.0, 1.0, 1.0] # isotropic
    format: "nrrd"

  duying:
    # All Duying sources (NII + Label.tar pairs)
    sources:
      birads_folders:
        # Folder name → BI-RADS grade
        - path: "${data_root}/2类"
          default_birads: "2"
        - path: "${data_root}/3类"
          default_birads: "3"
        - path: "${data_root}/4类"
          default_birads: null # must resolve from Excel or exclude
      annotated_batches:
        base: "${data_root}/已标注及BI-rads分类20260123"
        sub_dirs:
          - "已标注及BI-rads分类20260123-1"
          - "已标注及BI-rads分类20260123-2"
          - "已标注及BI-rads分类20260123-3"
          - "已标注及BI-rads分类20260123-4"
        birads_excel: "${data_root}/已标注及BI-rads分类20260123/病灶标注对应BI-rads分类.xlsx"
      abs_batch3:
        path: "${data_root}/ABS AI标注数据第三批-20260309"
        birads_source: "excel" # BI-RADS comes from same Excel
    spacing_mm: [1.0, 3.0, 1.0] # anisotropic — Y must be resampled
    format: "nii"

# ----------------------------------------------------------
# 2. Output directories
# ----------------------------------------------------------
output_root: "/Users/langtian/Desktop/NYU/MS Thesis/bus2d_output"
manifest_path: "${output_root}/manifest.json"
slices_root: "${output_root}/slices" # images/ and labels/ subdirs
shards_root: "${output_root}/shards" # train/ and val/ tar files

# ----------------------------------------------------------
# 3. Class mapping
# ----------------------------------------------------------
classes:
  # class_id: [birads_grade, yolo_name]
  0: ["2", "birads2"]
  1: ["3", "birads3"]
  2: ["4a", "birads4a"]
  3: ["4b", "birads4b"]
  4: ["4c", "birads4c"]

abus_label_map:
  B: "3" # benign  → BI-RADS 3
  M: "4a" # malignant → BI-RADS 4a

# ----------------------------------------------------------
# 4. Preprocessing
# ----------------------------------------------------------
preprocessing:
  resample_y_mm: 1.0 # resample Duying Y from 3mm → 1mm
  clip_percentiles: [1, 99] # intensity clipping
  output_dtype: "uint8"

# ----------------------------------------------------------
# 5. Slice extraction
# ----------------------------------------------------------
slice_extraction:
  middle_fraction: 0.333 # middle 1/3 of lesion Y-extent
  min_slices: 1
  max_slices: 20
  negative_ratio: 2.0 # neg : pos per volume
  negative_buffer: 10 # min slice gap from lesion Y-range

# ----------------------------------------------------------
# 6. Augmentation (training only)
# ----------------------------------------------------------
augmentation:
  horizontal_flip_p: 0.5
  brightness_contrast_p: 0.3
  brightness_limit: 0.15
  contrast_limit: 0.15
  gaussian_noise_p: 0.2
  gaussian_noise_var_limit: [5.0, 25.0]

# ----------------------------------------------------------
# 7. Train / Val split
# ----------------------------------------------------------
split:
  train_fraction: 0.9
  val_fraction: 0.1
  seed: 42
  stratify_by: ["dataset", "class"]

# ----------------------------------------------------------
# 8. WebDataset sharding
# ----------------------------------------------------------
sharding:
  target_shard_mb: 500
  shuffle_seed: 42

# ----------------------------------------------------------
# 9. HPC upload
# ----------------------------------------------------------
hpc:
  host: "jubail"
  remote_root: "/scratch/$USER/bus2d"
  rsync_flags: "-avz --progress"

# ----------------------------------------------------------
# 10. Training
# ----------------------------------------------------------
training:
  model: "yolo11m.pt"
  imgsz: 640
  batch: 64 # total across all GPUs
  epochs: 200
  patience: 30
  workers: 8
  device: [0, 1, 2, 3]
  project: "runs/bus2d"
  name: "exp1"

  # SLURM
  slurm:
    gpus: 4
    cpus: 16
    mem_gb: 64
    time_hours: 24
    partition: "nvidia"

# ----------------------------------------------------------
# 11. Evaluation
# ----------------------------------------------------------
evaluation:
  conf_thresholds:
    start: 0.1
    stop: 0.9
    step: 0.05
  iou_thresholds: [0.5]
  output_dir: "runs/bus2d/exp1/eval"
