# BUS-2D YOLO Dataset Configuration
# 2D breast lesion detection on coronal ABUS slices
# 5-class BI-RADS grading

# ── Paths ───────────────────────────────────────────────────────────
# At job start, shards are unpacked to $TMPDIR/bus2d_slices/
# The SLURM script sets this path via sed before training.
path: /tmp/bus2d_slices
train: images/train
val: images/val

# ── Classes ─────────────────────────────────────────────────────────
nc: 5
names:
  0: birads2
  1: birads3
  2: birads4a
  3: birads4b
  4: birads4c
